name: Build & Release Alpha Print

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and publish Electron app
        # --publish always: electron-builder cria o release, faz upload do .exe E do latest.yml
        # O latest.yml e obrigatorio para o electron-updater funcionar nos apps instalados
        run: npx tsc && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release description
        uses: softprops/action-gh-release@v2
        with:
          name: "Alpha Print v${{ steps.version.outputs.version }}"
          body: |
            ## Alpha Print v${{ steps.version.outputs.version }}

            ### Download
            Baixe o instalador `.exe` abaixo e execute para instalar/atualizar o Alpha Print.

            > **Nota:** Na primeira instalacao, o Windows SmartScreen pode exibir um alerta. Clique em "Mais informacoes" e depois "Executar assim mesmo".
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release success
        if: success()
        shell: bash
        run: |
          echo "Release v${{ steps.version.outputs.version }} published successfully!"
          echo "Download URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/AlphaPrintSetup-${{ steps.version.outputs.version }}.exe"
          echo ""
          echo "Auto-update: latest.yml foi gerado e enviado pelo electron-builder."
          echo "Apps instalados vao detectar a nova versao automaticamente."
