appId: com.alphacardapio.print
productName: Alpha Print
copyright: Copyright (c) 2026 Alpha Cardapio

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - src/renderer/**/*
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.map"

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: assets/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Alpha Print
  runAfterFinish: true

# Sem code signing — CEO decidiu nao pagar certificado
# O SmartScreen do Windows vai aparecer na primeira instalacao
# electron-builder converte o PNG para ICO automaticamente
