appId: com.alphacardapio.print
productName: Alpha Print
copyright: Copyright (c) 2026 Alpha Cardapio

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - src/renderer/**/*
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.map"

asarUnpack:
  - assets/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  allowElevation: true
  artifactName: "AlphaPrintSetup-${version}.${ext}"
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Alpha Print
  runAfterFinish: true
  installerLanguages:
    - pt_BR
  language: 1046

# Sem code signing — CEO decidiu nao pagar certificado
# O SmartScreen do Windows vai aparecer na primeira instalacao
# signAndEditExecutable REMOVIDO — precisa ser true (default) para embutir icone no exe via rcedit
# Sem CSC_LINK/CSC_KEY_PASSWORD, o builder edita o exe (icone) mas nao tenta assinar
# ICO com 4 tamanhos: 16, 32, 48, 256px

publish:
  provider: github
  owner: jefteamaral
  repo: alpha-print
  releaseType: release
