appId: com.alphacardapio.print
productName: Alpha Print
copyright: Copyright (c) 2026 Alpha Cardapio

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - src/renderer/**/*
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.map"

asarUnpack:
  - assets/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  allowElevation: true
  artifactName: "AlphaPrintSetup-${version}.${ext}"
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Alpha Print
  runAfterFinish: true
  installerLanguages:
    - pt_BR
  language: 1046

# Sem code signing — CEO decidiu nao pagar certificado
# O SmartScreen do Windows vai aparecer na primeira instalacao
# electron-builder converte o PNG para ICO automaticamente
